{% extends "base.html" %}
{% block body_class %}home-page{% endblock %}
{% block title %}Standings{% endblock %}

{% block full_width_main %}
  <div class="standings-shell">
    <div class="standings-shell-inner">
      <h1 class="standings-shell-title">Standings</h1>
      {% if standings_error %}
        <div class="alert alert-warning mb-4" role="alert">{{ standings_error }}</div>
      {% endif %}

      {% set extended = true %}
      {% include "partials/standings_grid.html" %}
    </div>
  </div>
{% endblock %}
